name: aqistat
description: A living weather intelligence platform with global AQI awareness.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^0.68.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Notifications
  flutter_local_notifications: ^17.2.1+2

  # UI Helpers
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  animate_do: ^3.3.4
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  url_launcher: ^6.2.6
  flutter_svg: ^2.0.10+1

  # Icons
  cupertino_icons: ^1.0.6
  weather_icons: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/
